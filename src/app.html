<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Favicons -->
    <link rel="icon" type="image/png" sizes="32x32" href="%sveltekit.assets%/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="%sveltekit.assets%/favicon-16x16.png" />
    <link rel="icon" href="%sveltekit.assets%/favicon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="%sveltekit.assets%/apple-touch-icon.png" />

    <!-- Primary Meta Tags -->
    <title>Lydia Venieri's Tarot of Love</title>
    <meta name="title" content="Lydia Venieri's Tarot of Love" />
    <meta name="description" content="Ask the oracle, Lydia. Receive mystical tarot readings with Lydia Venieri's artistic deck. Explore the wisdom of ancient myths and depth psychology through the Tarot of Love." />
    <meta name="theme-color" content="#000000" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://tarot-of-love.vercel.app/" />
    <meta property="og:title" content="Lydia Venieri's Tarot of Love" />
    <meta property="og:description" content="Ask the oracle, Lydia. Receive mystical tarot readings with Lydia Venieri's artistic deck. Explore the wisdom of ancient myths and depth psychology through the Tarot of Love." />
    <meta property="og:image" content="%sveltekit.assets%/og-image.webp" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/webp" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://tarot-of-love.vercel.app/" />
    <meta property="twitter:title" content="Lydia Venieri's Tarot of Love" />
    <meta property="twitter:description" content="Ask the oracle, Lydia. Receive mystical tarot readings with Lydia Venieri's artistic deck." />
    <meta property="twitter:image" content="%sveltekit.assets%/og-image.webp" />

    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
